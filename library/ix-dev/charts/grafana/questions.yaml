groups:
  - name: Main Configuration
    description: Configure Grafana
  - name: Storage Configuration
    description: Configure Storage for Grafana
  - name: Ingress Configuration
    description: Configure Ingress for Grafana

questions:
  - variable: TZ
    group: Main Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: dataHostPath
    group: Storage Configuration
    label: Grafana Data Host Path
    schema:
      type: hostpath
      required: true

  - variable: ingressHost
    group: Ingress Configuration
    label: Ingress Rule Hostname
    schema:
      type: string
      required: true

portals:
  open:
    protocols:
      - "https"
    host:
      - "$variable-ingressHost"
    ports:
      - "443"
    path: "/"
