groups:
  - name: Traefik Configuration
    description: Configure Traefik
  - name: Network Configuration
    description: Configure Network for Traefik


portals:
  web_portal:
    protocols:
      - "https"
    host:
      - "host"
    ports:
      - "9000"
    path: "/dashboard"


questions:
  - variable: TZ
    group: Traefik Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone
